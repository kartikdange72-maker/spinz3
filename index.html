<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spinz Audit Photo Gallery</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
    body{
      background: linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);
      min-height:100vh;padding:16px;color:#111827;
    }
    .container{
      max-width:1900px;margin:0 auto;background:#fff;border-radius:16px;
      box-shadow:0 12px 34px rgba(0,0,0,.10);overflow:hidden;
    }
    header{
      background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:#fff;padding:18px;text-align:center;
    }
    header h1{font-size:1.55rem;margin-bottom:4px}

    .toolbar{
      padding:10px 12px;
      display:flex;gap:10px;flex-wrap:wrap;
      align-items:center;justify-content:space-between;
      border-bottom:1px solid #eee;background:#fafbfc;
    }
    .toolbar .left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .toolbar input{
      padding:9px 11px;border:2px solid #e5e7eb;border-radius:10px;
      font-size:.95rem;min-width:260px;outline:none;
    }
    .toolbar input:focus{border-color:#667eea}
    .toolbar select{
      padding:9px 11px;border:2px solid #e5e7eb;border-radius:10px;
      font-size:.95rem;outline:none;background:#fff;min-width:170px;
    }
    .btn{
      padding:9px 12px;border:none;border-radius:10px;cursor:pointer;
      font-weight:900;transition:.22s;
    }
    .btn.primary{background:#667eea;color:#fff}
    .btn.primary:hover{background:#5a6fd8}
    .btn.warn{background:#ff9800;color:#fff}
    .btn.warn:hover{background:#e68900}
    .btn.ghost{background:#fff;border:2px solid #e5e7eb;color:#374151}
    .btn.ghost:hover{border-color:#cbd5e1}
    .meta{font-size:.9rem;color:#4b5563}

    .loading{padding:28px;text-align:center;color:#667eea;display:none}
    .spinner{
      border:4px solid #f3f3f3;border-top:4px solid #667eea;border-radius:50%;
      width:34px;height:34px;animation:spin 1s linear infinite;margin:0 auto 12px;
    }
    @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    .error{
      display:none;margin:14px 14px;
      color:#b00020;background:#ffebee;padding:12px;border-radius:12px;
      border:1px solid #ffcdd2;white-space:pre-line;
    }

    /* ONE shop per row */
    .grid{padding:14px;display:grid;grid-template-columns:1fr;gap:16px;}

    .card{
      border:1px solid #eee;border-radius:14px;overflow:hidden;
      box-shadow:0 6px 16px rgba(0,0,0,.07);
      transition:transform .18s ease, box-shadow .18s ease;
      background:#fff;
    }
    .card:hover{transform:translateY(-2px);box-shadow:0 14px 26px rgba(0,0,0,.11)}
    .cardHead{
      background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:#fff;padding:12px 14px;
      display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;
    }
    .cardTitle{font-size:1.08rem;font-weight:950;line-height:1.15}
    .cardSub{font-size:.9rem;opacity:.93;line-height:1.2;margin-top:4px}
    .pillRow{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      background: rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.22);
      padding:4px 9px;border-radius:999px;
      font-size:.82rem;font-weight:950;
      backdrop-filter: blur(6px);
      white-space:nowrap;
    }

    .cardBody{
      padding:12px 14px;
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
      background:#fff;
    }

    /* Photos grid: default is 4 columns; JS will shrink to 1 when filtering a single photo type */
    .photos{
      border:1px solid #eef2f7;
      border-radius:12px;
      padding:12px;
      background:#fff;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:14px;
    }
    .photoBox{
      min-width:0;
      border:1px solid #f0f0f0;
      border-radius:12px;
      padding:10px;
      background:#fff;
    }
    .photoLabel{
      font-weight:950;color:#764ba2;padding-bottom:8px;margin-bottom:10px;border-bottom:2px solid #f4f4f4;
      font-size:.95rem;display:flex;gap:8px;align-items:center;
    }
    .photoLabel .dot{width:9px;height:9px;border-radius:50%;background:#764ba2;display:inline-block;opacity:.85}

    .imgWrap{
      width:100%;
      height:380px; /* photo size */
      border-radius:12px;
      background:#f8f9fa;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;position:relative;
    }
    .imgWrap img{
      max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;
      transition:transform .22s ease;cursor:pointer;
    }
    .imgWrap:hover img{transform:scale(1.02)}
    .noImg{
      height:380px;border-radius:12px;background:#f8f9fa;
      display:flex;align-items:center;justify-content:center;
      color:#9ca3af;font-style:italic;text-align:center;padding:12px;
    }

    /* Compact description */
    .descCompact{
      border:1px solid #eef2f7;border-radius:12px;padding:10px;background:#fbfdff;
      display:flex;flex-direction:column;gap:8px;
    }
    .descTop{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
    .descTop b{font-size:.96rem}
    .miniMeta{
      display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;
      font-size:.78rem;color:#6b7280;font-weight:900;
    }
    .miniPill{
      background:#fff;border:1px solid #e5e7eb;border-radius:999px;
      padding:4px 8px;font-weight:950;color:#374151;
    }
    .kvList{display:grid;grid-template-columns: 1fr 1fr;gap:6px 12px;}
    .kvLine{display:flex;gap:6px;align-items:baseline;padding:4px 0;border-bottom:1px dashed #e9edf5;min-width:0;}
    .kvLine:last-child{border-bottom:none}
    .k{
      font-size:.78rem;color:#6b7280;font-weight:950;white-space:nowrap;
      max-width:52%;overflow:hidden;text-overflow:ellipsis;
    }
    .v{
      font-size:.88rem;color:#111827;font-weight:850;
      overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
      word-break:break-word;
    }
    .kvEmpty{
      padding:10px;color:#9ca3af;font-style:italic;background:#fff;
      border:1px dashed #e5e7eb;border-radius:12px;
    }

    /* responsive fallback (only when screen is too small) */
    @media (max-width: 1400px){
      .photos{ grid-template-columns: repeat(2, 1fr); }
      .imgWrap,.noImg{ height:340px; }
    }
    @media (max-width: 820px){
      .kvList{ grid-template-columns: 1fr; }
      .toolbar{justify-content:flex-start}
      .toolbar input,.toolbar select{width:100%}
    }
    @media (max-width: 720px){
      .photos{ grid-template-columns: 1fr; }
      .imgWrap,.noImg{ height:300px; }
    }

    /* Modal */
    .img-modal{
      position:fixed;inset:0;background:rgba(0,0,0,.82);
      display:none;align-items:center;justify-content:center;
      z-index:9999;padding:18px;
    }
    .img-modal.open{display:flex;}
    .img-modal-inner{
      position:relative;
      width:min(1200px, 94vw);
      height:min(85vh, 760px);
      display:flex;align-items:center;justify-content:center;
    }
    .img-modal img{
      max-width:100%;max-height:100%;
      width:auto;height:auto;object-fit:contain;border-radius:12px;
      box-shadow:0 16px 45px rgba(0,0,0,.35);
      transition:transform .18s ease;
      transform-origin:center center;
      cursor: zoom-in;user-select:none;
    }
    .img-modal img:hover{transform: scale(1.25);cursor: zoom-in;}
    .img-modal .close-btn{
      position:absolute;top:-10px;right:-10px;
      width:42px;height:42px;border-radius:50%;
      border:none;cursor:pointer;font-size:18px;font-weight:950;
      background:#fff;color:#111;box-shadow:0 10px 24px rgba(0,0,0,.25);
    }
    .img-modal .hint{
      position:absolute;left:8px;bottom:-4px;color:rgba(255,255,255,.85);
      font-size:12px;user-select:none;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Spinz Audit Photo Gallery</h1>
    </header>

    <div class="toolbar">
      <div class="left">
        <input id="q" type="text" placeholder="Search: Rtr / Outlet / Town / Auditor / Remarks..." />
        <select id="townFilter"><option value="">Town: All</option></select>
        <select id="auditorFilter"><option value="">Auditor: All</option></select>

        <!-- ✅ Photo filter -->
        <select id="photoFilter">
          <option value="all">Photos: All</option>
          <option value="Shop_Front_Photo_Link">Photos: Shop Front</option>
          <option value="Sample_Box_Photo_Link">Photos: Sample Box</option>
          <option value="Spinz_Stock_Photo_Link">Photos: Spinz Stock</option>
          <option value="Shelf_Photo_Link">Photos: Shelf</option>
        </select>

        <select id="verifiedScope">
          <option value="verified">Scope: Verified</option>
          <option value="all">Scope: All</option>
        </select>

        <button class="btn primary" id="btnFilter">Apply</button>
        <button class="btn warn" id="btnReset">Show All</button>
        <button class="btn ghost" id="btnReload">Reload</button>
      </div>
      <div class="meta" id="meta"></div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Pulling Google Sheet + rendering…</div>
    </div>

    <div class="error" id="error"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="img-modal" id="imgModal" aria-hidden="true">
    <div class="img-modal-inner">
      <button class="close-btn" id="imgModalClose" title="Close (Esc)">✕</button>
      <img id="imgModalImg" alt="Full screen view"/>
      <div class="hint">Hover to zoom • Click outside / Esc to close</div>
    </div>
  </div>

  <script>
    const SHEET_ID = "1EMGYqegrSKBqDLD3WP1qewdKKvDIvgfrqKUSQ88epzM";
    const GID = "0";
    const SHEET_NAME = "Sheet1";
    const PLACEHOLDER = "https://via.placeholder.com/900x600/9e9e9e/ffffff?text=Image+Not+Available";

    const COLS = {
      rtr: "Rtr_Code",
      outlet: "Name_of_Outlet",
      town: "Town",
      verified: "Verified",
      submit: "Submission_Time",
      auditor: "Auditor_ID",
      lat: "Live_Lat",
      long: "Live_Long",
      dist: "Distance",
      shopOpen: "Shop_Open",
      desc: [
        "Spinz_Sample_Given",
        "Sample_Box_Available",
        "Stock_Exhausted_Days",
        "Avg_Samples_Per_Week",
        "Consumers_Wanted_To_Buy_Spinz_After_Sample",
        "Consumers_Wanted_To_Buy_Spinz_Other",
        "During_Purchase_SKU_Details",
        "Spinz_Packs_Per_Month",
        "Spinz_Repeat_Frequency",
        "Spinz_Repeat_Frequency_Other",
        "Gender_Buy_More",
        "Female_Buyer_Segment",
        "Next_Repurchase_Cycle",
        "Next_Repurchase_Cycle_Other",
        "Customer_Feedback",
        "Willingness_to_Switch",
        "Spinz_Stocked",
        "Spinz_Stock_SKUs",
        "Remarks"
      ],
      photos: [
        { key: "Shop_Front_Photo_Link", label: "Shop Front" },
        { key: "Sample_Box_Photo_Link", label: "Sample Box" },
        { key: "Spinz_Stock_Photo_Link", label: "Spinz Stock" },
        { key: "Shelf_Photo_Link", label: "Shelf" }
      ]
    };

    const grid = document.getElementById("grid");
    const loading = document.getElementById("loading");
    const error = document.getElementById("error");
    const meta = document.getElementById("meta");

    const q = document.getElementById("q");
    const townFilter = document.getElementById("townFilter");
    const auditorFilter = document.getElementById("auditorFilter");
    const verifiedScope = document.getElementById("verifiedScope");
    const photoFilter = document.getElementById("photoFilter");

    const btnFilter = document.getElementById("btnFilter");
    const btnReset = document.getElementById("btnReset");
    const btnReload = document.getElementById("btnReload");

    const imgModal = document.getElementById("imgModal");
    const imgModalImg = document.getElementById("imgModalImg");
    const imgModalClose = document.getElementById("imgModalClose");

    let rows = [];
    let filtered = [];
    let verifiedBase = [];

    function showLoading(on){ loading.style.display = on ? "block" : "none"; }
    function showError(msg){ error.textContent = msg; error.style.display = "block"; }
    function clearError(){ error.style.display = "none"; error.textContent = ""; }

    function normalizeCell(v){ return (v ?? "").toString().trim(); }
    function lower(v){ return normalizeCell(v).toLowerCase(); }

    function escapeHtml(str){
      return (str ?? "").toString()
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function escapeAttr(str){ return escapeHtml(str).replaceAll("\n"," "); }

    function uniqSorted(arr){
      return [...new Set(arr.filter(x => x !== ""))].sort((a,b) => a.localeCompare(b));
    }
    function displayKeyLabel(k){ return k.replaceAll("_"," "); }

    function parseGviz(text){
      const match = text.match(/setResponse\(([\s\S]*?)\);\s*$/);
      if (!match) throw new Error("GViz response format changed / not accessible.");
      const json = JSON.parse(match[1]);
      const table = json.table;
      const cols = table.cols.map(c => (c.label || "").trim());
      const out = [];
      for (const r of (table.rows || [])) {
        const obj = {};
        (r.c || []).forEach((cell, idx) => {
          const key = cols[idx] || `COL_${idx}`;
          const val = cell ? ((cell.f ?? cell.v) ?? "") : "";
          obj[key] = val;
        });
        out.push(obj);
      }
      return out;
    }

    function cleanWeirdDateStrings(colKey, val){
      const s = normalizeCell(val);
      const isDateLike = /^Date\(\d{4},\d{1,2},\d{1,2}\)$/.test(s);
      if (!isDateLike) return s;
      if (colKey === COLS.submit) return s;
      return "";
    }

    function convertDriveLink(driveLink) {
      if (!driveLink || driveLink.toString().trim() === "") return null;
      const link = driveLink.toString().trim();
      if (link.startsWith("http") && (link.includes("thumbnail?id=") || link.match(/\.(png|jpg|jpeg|webp)(\?.*)?$/i))) return link;

      const patterns = [/\/d\/([^\/]+)/,/id=([^&]+)/,/\/file\/d\/([^\/]+)/,/drive\.google\.com\/open\?id=([^&]+)/];
      let fileId = null;
      for (const pattern of patterns) {
        const match = link.match(pattern);
        if (match && match[1]) { fileId = match[1]; break; }
      }
      if (!fileId) return null;
      return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1600`;
    }

    function getPhotosToShow(){
      const key = normalizeCell(photoFilter.value);
      if (!key || key === "all") return COLS.photos;
      return COLS.photos.filter(p => p.key === key);
    }

    function buildCard(row){
      const rtr = normalizeCell(row[COLS.rtr]);
      const outlet = normalizeCell(row[COLS.outlet]);
      const town = normalizeCell(row[COLS.town]);
      const verified = normalizeCell(row[COLS.verified]);
      const submit = normalizeCell(row[COLS.submit]);
      const auditor = normalizeCell(row[COLS.auditor]);
      const dist = normalizeCell(row[COLS.dist]);
      const shopOpen = normalizeCell(row[COLS.shopOpen]);

      const headHtml = `
        <div class="cardHead">
          <div>
            <div class="cardTitle">${escapeHtml(outlet || "Unknown Outlet")}
              <span style="opacity:.9;font-weight:900">(${escapeHtml(rtr || "No Rtr_Code")})</span>
            </div>
            <div class="cardSub">${escapeHtml(town || "Town NA")}
              • Auditor: <b>${escapeHtml(auditor || "NA")}</b>
              • Submitted: <b>${escapeHtml(submit || "NA")}</b>
            </div>
          </div>
          <div class="pillRow">
            <div class="pill">Verified: ${escapeHtml(verified || "NA")}</div>
            <div class="pill">Shop: ${escapeHtml(shopOpen || "NA")}</div>
            <div class="pill">Distance: ${escapeHtml(dist || "NA")}</div>
          </div>
        </div>
      `;

      const lat = normalizeCell(row[COLS.lat]);
      const lng = normalizeCell(row[COLS.long]);

      const filledItems = COLS.desc
        .map(k => ({ k, v: cleanWeirdDateStrings(k, row[k]) }))
        .map(x => ({ k: x.k, v: normalizeCell(x.v) }))
        .filter(item => item.v !== "");

      const kvHtml = filledItems.map(item => `
        <div class="kvLine" title="${escapeAttr(displayKeyLabel(item.k) + ': ' + item.v)}">
          <div class="k">${escapeHtml(displayKeyLabel(item.k))}</div>
          <div class="v">${escapeHtml(item.v)}</div>
        </div>
      `).join("");

      const descHtml = `
        <div class="descCompact">
          <div class="descTop">
            <b>Audit Summary</b>
            <div class="miniMeta">
              <span class="miniPill">Lat: ${escapeHtml(lat || "—")}</span>
              <span class="miniPill">Long: ${escapeHtml(lng || "—")}</span>
            </div>
          </div>
          ${
            filledItems.length
              ? `<div class="kvList">${kvHtml}</div>`
              : `<div class="kvEmpty">No audit fields filled for this outlet.</div>`
          }
        </div>
      `;

      const photosToShow = getPhotosToShow();

      const photosHtml = photosToShow.map(p => {
        const raw = row[p.key];
        const url = convertDriveLink(raw);
        return `
          <div class="photoBox">
            <div class="photoLabel"><span class="dot"></span> ${escapeHtml(p.label)}</div>
            ${
              url
                ? `<div class="imgWrap">
                     <img src="${url}" alt="${escapeAttr(p.label)}"
                          loading="lazy"
                          onerror="this.onerror=null; this.src='${PLACEHOLDER}'">
                   </div>`
                : `<div class="noImg">Image not available</div>`
            }
          </div>
        `;
      }).join("");

      const card = document.createElement("div");
      card.className = "card";

      // ✅ If user selects a single photo type, render 1 column so it doesn't look stupid with empty space
      const cols = Math.max(1, Math.min(4, photosToShow.length));
      card.innerHTML =
        headHtml +
        `<div class="cardBody">
           <div class="photos" style="grid-template-columns: repeat(${cols}, 1fr)">${photosHtml}</div>
           ${descHtml}
         </div>`;

      return card;
    }

    function render(list){
      grid.innerHTML = "";
      meta.textContent = `Showing ${list.length} / ${rows.length}`;

      if (!list.length){
        grid.innerHTML = `
          <div style="text-align:center;padding:22px;color:#6b7280;">
            <div style="font-size:1.08rem;font-weight:950;margin-bottom:6px;color:#111827;">No matching outlets found</div>
            <div>Adjust filters or click <b>Show All</b>.</div>
          </div>
        `;
        return;
      }

      const frag = document.createDocumentFragment();
      list.forEach(r => frag.appendChild(buildCard(r)));
      grid.appendChild(frag);
    }

    function populateFilterDropdowns(data){
      const towns = uniqSorted(data.map(r => normalizeCell(r[COLS.town])));
      townFilter.innerHTML = `<option value="">Town: All</option>` + towns.map(t => `<option value="${escapeAttr(t)}">${escapeHtml(t)}</option>`).join("");

      const auditors = uniqSorted(data.map(r => normalizeCell(r[COLS.auditor])));
      auditorFilter.innerHTML = `<option value="">Auditor: All</option>` + auditors.map(a => `<option value="${escapeAttr(a)}">${escapeHtml(a)}</option>`).join("");
    }

    function applyFilter(){
      const term = lower(q.value);
      const townSel = normalizeCell(townFilter.value);
      const audSel = normalizeCell(auditorFilter.value);
      const scope = normalizeCell(verifiedScope.value);
      const base = (scope === "verified") ? verifiedBase : rows;

      filtered = base.filter(r => {
        if (townSel && normalizeCell(r[COLS.town]) !== townSel) return false;
        if (audSel && normalizeCell(r[COLS.auditor]) !== audSel) return false;
        if (!term) return true;

        const hay = [
          r[COLS.rtr], r[COLS.outlet], r[COLS.town], r[COLS.auditor],
          r[COLS.shopOpen], r[COLS.dist],
          r["Remarks"], r["Customer_Feedback"], r["Spinz_Stock_SKUs"],
        ].map(x => lower(x)).join(" | ");
        return hay.includes(term);
      });

      render(filtered);
    }

    // MODAL
    function openImgModal(src){
      imgModalImg.src = src;
      imgModal.classList.add("open");
      imgModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }
    function closeImgModal(){
      imgModal.classList.remove("open");
      imgModal.setAttribute("aria-hidden", "true");
      imgModalImg.src = "";
      document.body.style.overflow = "";
    }

    document.addEventListener("click", (e) => {
      const img = e.target.closest(".imgWrap img");
      if (!img) return;
      openImgModal(img.src);
    });
    imgModal.addEventListener("click", (e) => { if (e.target === imgModal) closeImgModal(); });
    imgModalClose.addEventListener("click", closeImgModal);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && imgModal.classList.contains("open")) closeImgModal();
    });

    async function loadSheet(){
      clearError();
      showLoading(true);
      grid.innerHTML = "";
      meta.textContent = "";
      try{
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&tqx=out:json&headers=1`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status} while fetching sheet.`);
        const text = await res.text();
        const data = parseGviz(text);

        const required = [
          COLS.rtr, COLS.outlet, COLS.town, COLS.verified, COLS.submit, COLS.auditor,
          COLS.lat, COLS.long, COLS.dist, COLS.shopOpen,
          ...COLS.desc,
          ...COLS.photos.map(p => p.key)
        ];
        const missing = required.filter(k => !(k in (data[0] || {})));
        if (missing.length){
          throw new Error(
            `Sheet headers mismatch. Missing columns:\n- ${missing.join("\n- ")}\n\n` +
            `Fix header names in Google Sheet tab "${SHEET_NAME}" (must match exactly).`
          );
        }

        rows = data.filter(r => normalizeCell(r[COLS.outlet]) !== "");
        verifiedBase = rows.filter(r => lower(r[COLS.verified]) === "yes");

        populateFilterDropdowns(rows);

        verifiedScope.value = "verified";
        photoFilter.value = "all";
        filtered = [...verifiedBase];

        render(filtered);
        showLoading(false);
      }catch(e){
        showLoading(false);
        showError(
          `Failed to load Google Sheet.\n${e.message}\n\n` +
          `Google Sheet sharing must be set to "Anyone with the link can view".`
        );
      }
    }

    // EVENTS
    btnFilter.addEventListener("click", applyFilter);
    btnReset.addEventListener("click", () => {
      q.value = "";
      townFilter.value = "";
      auditorFilter.value = "";
      verifiedScope.value = "all";
      photoFilter.value = "all";
      applyFilter();
    });
    btnReload.addEventListener("click", loadSheet);

    q.addEventListener("keypress", (e) => { if (e.key === "Enter") applyFilter(); });
    townFilter.addEventListener("change", applyFilter);
    auditorFilter.addEventListener("change", applyFilter);
    verifiedScope.addEventListener("change", applyFilter);
    photoFilter.addEventListener("change", applyFilter);

    loadSheet();
  </script>
</body>
</html>
